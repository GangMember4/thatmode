<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$MODE</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
font-weight:900;
background:linear-gradient(to bottom,#000000, #111111);
}

.token{
padding:60px 20px;
border-top:1px solid #222;
}

.ticker{
font-size:72px;
color:#9eff00;
font-weight:900;
}

.contract{
margin-top:20px;
background:#111;
padding:18px;
border-radius:10px;
word-break:break-all;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

button{
margin-top:25px;
padding:14px 30px;
font-weight:bold;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="hero">
It's time to tap into that mode.
</div>

<div class="token">

<div class="ticker">$MODE</div>

<div class="contract" id="contract">
PASTE_YOUR_TOKEN_ADDRESS_HERE
</div>

<button onclick="copyAddress()">Copy Address</button>

</div>

<script>
function copyAddress(){
const text = document.getElementById("contract").innerText;
navigator.clipboard.writeText(text);
alert("Address copied!");
}
</script>

</body>
</html>
